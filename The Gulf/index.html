    padding:40px 20px;
  }

  .page {
    width:660px; height:880px; background:#07080a;
    box-shadow:0 8px 60px rgba(0,0,0,.6);
    position:relative; overflow:hidden;
    cursor: crosshair;
  }
  .page::after {

    background: radial-gradient(130% 78% at 50% 51%, transparent 54%, rgba(0,0,0,0.52) 100%);
  }

  span { position:absolute; white-space:nowrap; line-height:1; }

  /* ==========================================================
     THE SIGHTLINE. It runs from one to the other. It is never
     interrupted by anything but words.
     ========================================================== */
  .sight {
    position:absolute; z-index:1; pointer-events:none;
    left:62px; right:62px; top:481px; height:1px;
    background: linear-gradient(90deg,
      rgba(171,42,30,0.30), rgba(171,42,30,0.05) 26%,
      rgba(171,42,30,0.03) 74%, rgba(171,42,30,0.30));
    animation: sight 11s ease-in-out infinite;
  }
  @keyframes sight {
    0%,100% { opacity: 0.30; }
    50%     { opacity: 0.62; }
  }

  /* ==========================================================
     I. YOU.
     Same size. Same colour. Same height on the page.
     Two hearts, two different rates. They pass in and out of
     phase for as long as the page is open and never once beat
     together.
     ========================================================== */

  #A_I   { animation: beatA 5.2s ease-in-out infinite; transform-origin: left center; }
  #A_you { animation: beatB 5.9s ease-in-out infinite; transform-origin: right center; }
  @keyframes beatA {
    0%,100% { opacity: 0.72; transform: scale(1); }
    42%     { opacity: 1;    transform: scale(1.014); }
  }
  @keyframes beatB {
    0%,100% { opacity: 0.72; transform: scale(1); }
    42%     { opacity: 1;    transform: scale(1.014); }
  }

  /* ==========================================================
     THE FIELD. The same twenty thoughts, thought again.
     A pulse of attention moves through them in reading order,
     lights each one for a moment, and starts over. Forever.
     ========================================================== */
  .frag {
    z-index:10;
    will-change: transform, opacity, color;
    transition: color .5s ease, opacity .5s ease, text-shadow .5s ease;
  }
  .frag.lit {
    color:#c9c3b6 !important;
    opacity:1 !important;
    text-shadow: 0 0 12px rgba(201,195,182,0.22);
    transition: color .09s ease, opacity .09s ease, text-shadow .09s ease;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    .frag.lit { color: inherit !important; text-shadow: none; }
  }
  @media (max-width: 720px) {
    body { padding:14px 8px; }
    .page { width:100%; max-width:660px; height:auto; aspect-ratio:660/880; }
