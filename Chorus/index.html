<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Chorus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root { --noise: 1; }

  body {
    background:#1a1a18; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:40px 20px;
    cursor: default;
  }

  .page {
    width:660px; height:880px; background:#07080a;
    box-shadow:0 8px 60px rgba(0,0,0,.6);
    position:relative; overflow:hidden;
  }

  .page::after {
    content:""; position:absolute; inset:0; pointer-events:none; z-index:60;
    background: radial-gradient(120% 80% at 50% 42%, transparent 52%, rgba(0,0,0,0.5) 100%);
  }

  span { position:absolute; white-space:nowrap; line-height:1; }

  /* ============================================================
     THE CHORUS. It never stops. It only gets quieter when you do.
     ============================================================ */
  .cmd {
    z-index:20;
    opacity: calc(var(--noise) * var(--o));
    animation: bark 3.4s ease-in-out infinite;
  }
  .cmd.b { animation-delay: .5s; }
  @keyframes bark {
    0%,100% { letter-spacing: var(--lsa); }
    46%     { letter-spacing: var(--lsb); }
  }

  /* the rain of imperatives. one word-spacing per loop = seamless. */
  #rain {
    position:absolute; inset:0; z-index:10;
    opacity: calc(0.07 + 0.93 * var(--noise));
    -webkit-mask-image: linear-gradient(to bottom, transparent 92px, #000 132px, #000 566px, transparent 638px);
            mask-image: linear-gradient(to bottom, transparent 92px, #000 132px, #000 566px, transparent 638px);
    will-change: opacity;
  }
  .rain { animation: fall var(--dur) linear infinite; }
  @keyframes fall { to { transform: translateY(var(--sp)); } }

  /* the low cloud of half-heard words */
  #dust {
    position:absolute; inset:0; z-index:8;
    opacity: calc(0.10 + 0.90 * var(--noise));
  }
  .dust { opacity: var(--o); animation: shimmer 9s ease-in-out infinite; }
  @keyframes shimmer {
    0%,100% { opacity: calc(var(--o) * 0.4); }
    50%     { opacity: var(--o); }
  }

  /* what has settled just above the pile, still twitching */
  #drift {
    position:absolute; inset:0; z-index:12;
    opacity: calc(0.09 + 0.91 * var(--noise));
  }
  .drift { animation: settle 7s ease-in-out infinite; }
  @keyframes settle {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(1.6px); }
  }

  /* ============================================================
     THE HEAP. Everything that landed. It shudders under the rest.
     ============================================================ */
  #heap {
    position:absolute; inset:0; z-index:30;
    opacity: calc(0.12 + 0.88 * var(--noise));
  }
  .heap { animation: shudder 5.5s ease-in-out infinite; }
  @keyframes shudder {
    0%,100% { transform: rotate(var(--r)) translate(0,0); }
    50%     { transform: rotate(calc(var(--r) + 0.5deg)) translate(0.4px, 0.7px); }
  }

  /* ============================================================
     IT HURT.
     It does not move. It never moves. It is the only thing here
     that was never a command. The chorus buries it, and the only
     thing that uncovers it is your stillness.
     ============================================================ */
  #hurt {
    z-index:50;
    opacity: calc(0.035 + 0.945 * (1 - var(--noise)));
    text-shadow: 0 0 calc((1 - var(--noise)) * 26px) rgba(182,134,110, calc((1 - var(--noise)) * 0.55));
    transition: opacity .18s linear, text-shadow .18s linear;
  }
  #halo {
    position:absolute; z-index:40; pointer-events:none;
    left:250px; top:630px; width:220px; height:96px;
    background: radial-gradient(closest-side, rgba(182,134,110,0.16), transparent 72%);
    opacity: calc((1 - var(--noise)) * (1 - var(--noise)));
    filter: blur(6px);
  }

  /* it only tells you how to hear it once you are already quiet */
  #hint {
    position:absolute; z-index:55; left:0; right:0; bottom:26px;
    text-align:center;
    font-family:'Courier Prime', monospace; font-size:8.5px;
    letter-spacing:0.42em; text-transform:uppercase;
    color:#5a5f60;
    opacity: calc((0.62 - var(--noise)) * 2.2);
    pointer-events:none;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
  @media (max-width: 720px) {
    body { padding:14px 8px; }
    .page { width:100%; max-width:660px; height:auto; aspect-ratio:660/880; }
    .stage { transform-origin: top left; }
  }
</style>
</head>
<body>

<div class="page" id="page">
  <div class="stage" id="stage" style="position:absolute; inset:0;">
    <div id="halo"></div>
    <div id="dust"></div>
    <div id="rain"></div>
    <div id="drift"></div>
    <div id="heap"></div>
    <div id="hint">be still</div>
  </div>
</div>

const page  = document.getElementById('page');
const stage = document.getElementById('stage');
const L = {
  rain:  document.getElementById('rain'),
  dust:  document.getElementById('dust'),
  drift: document.getElementById('drift'),
  heap:  document.getElementById('heap'),
};

const CORM = "'Cormorant Garamond',serif";
const COUR = "'Courier Prime',monospace";

for (const d of D) {
  const s = document.createElement('span');
  s.textContent = d.t;
  s.style.left = d.x + 'px';
  s.style.top  = d.y + 'px';
  s.style.fontSize = d.s + 'px';
  s.style.color = d.col;
  s.style.fontWeight = d.w || 300;
  if (d.ls) s.style.letterSpacing = d.ls;
  if (d.fs) s.style.fontStyle = d.fs;

  if (d.c === 'hurt') {
    s.id = 'hurt';
    s.style.fontFamily = CORM;
    s.style.transform = 'rotate(' + d.r + 'deg)';
    s.style.transformOrigin = 'left center';
    stage.appendChild(s);
    continue;
  }

  if (d.c === 'cmd') {
    s.className = 'cmd' + (d.y > 80 ? ' b' : '');
    s.style.fontFamily = COUR;
    s.style.setProperty('--o', d.o);
    const base = parseFloat(d.ls) || 1.4;
    s.style.setProperty('--lsa', base + 'px');
    s.style.setProperty('--lsb', (base * 1.9) + 'px');
    stage.appendChild(s);
    continue;
  }

  if (d.c === 'heap') {
    s.className = 'heap';
    s.style.fontFamily = COUR;
    s.style.opacity = d.o;
    s.style.setProperty('--r', d.r + 'deg');
    s.style.transformOrigin = 'left center';
    s.style.animationDelay = d.d + 's';
    L.heap.appendChild(s);
    continue;
  }

  s.style.fontFamily = CORM;

  if (d.c === 'rain') {
    s.className = 'rain';
    s.style.opacity = d.o;
    s.style.setProperty('--sp', d.sp + 'px');
    s.style.setProperty('--dur', d.dur + 's');
    L.rain.appendChild(s);
  } else if (d.c === 'drift') {
    s.className = 'drift';
    s.style.opacity = d.o;
    s.style.animationDelay = d.d + 's';
    L.drift.appendChild(s);
  } else {
    s.className = 'dust';
    s.style.setProperty('--o', d.o);
    s.style.animationDelay = d.d + 's';
    L.dust.appendChild(s);
  }
}

/* ------------------------------------------------------------------
   The chorus is fed by your attention. Move, scroll, touch, type, and
   it comes back at full volume and buries the line again. Do nothing,
   and over about ten seconds it thins out until the only thing left
   on the page is the one sentence nobody was allowed to say.
   ------------------------------------------------------------------ */
const root = document.documentElement;
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

if (reduce) {
  root.style.setProperty('--noise', '0.18');
} else {
  let noise = 1;
  const loud = () => { noise = 1; };

  ['mousemove','pointerdown','wheel','scroll','keydown','touchstart','touchmove']
    .forEach(e => addEventListener(e, loud, { passive: true }));

  (function tick() {
    requestAnimationFrame(tick);
    noise *= 0.9952;              /* ~10s of stillness to reach silence */
    if (noise < 0.0015) noise = 0.0015;
    root.style.setProperty('--noise', noise.toFixed(4));
  })();
}

/* scale the fixed 660x880 stage on small screens */
function fit() {
  const w = page.clientWidth;
  const k = w / 660;
  stage.style.transform = k < 1 ? 'scale(' + k + ')' : '';
  stage.style.width = k < 1 ? '660px' : '';
  stage.style.height = k < 1 ? '880px' : '';
}
fit();
addEventListener('resize', fit);
</script>
